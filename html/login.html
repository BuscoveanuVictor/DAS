<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthX - Login (Vulnerabil)</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #2c3e50; margin: 0; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); width: 300px; }
        h2 { text-align: center; color: #3498db; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; font-size: 14px; }
        .links { margin-top: 15px; text-align: center; font-size: 12px; }
        .links a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>AuthX - Login v1</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email / Username:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="password">Parolă:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Autentificare</button>
    </form>
    
    <div id="message"></div>
    
    <div class="links">
        <p>Nu ai cont? <a href="register">Înregistrează-te aici</a></p>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(event) {
        event.preventDefault(); 

        const emailVal = document.getElementById('email').value;
        const passwordVal = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        let API;

        if(window.location.href.includes("nonvulnerable")){
            API = "http://127.0.0.1:8000/nonvulnerable/login";   
        } else {
            API = "http://127.0.0.1:8000/vulnerable/login";
        }

        try {
            
            // Trimitem request-ul către endpoint-ul de login
            const response = await fetch(API, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: emailVal, password: passwordVal })
            });

            const data = await response.json();

            if (response.ok) {
                messageDiv.style.color = 'green';
                messageDiv.innerText = "Succes: " + data.message;
                // Aici în viitor poți face un redirect către o pagină "dashboard.html"
            } else {
                messageDiv.style.color = 'red';
                // Aici se vede vulnerabilitatea 4.4 (User Enumeration)!
                // Va afișa exact mesajul dat de backend ("User inexistent" vs "Parolă greșită")
                messageDiv.innerText = "Eroare: " + data.detail; 
            }
        } catch (error) {
            messageDiv.style.color = 'red';
            messageDiv.innerText = "Eroare de conexiune. Serverul rulează?";
        }
    });
</script>

</body>
</html>
