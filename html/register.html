<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthX - Register (Vulnerabil)</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #2c3e50; margin: 0; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); width: 300px; }
        h2 { text-align: center; color: #e74c3c; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #c0392b; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>AuthX - Inregistrare v1</h2>
    <form id="registerForm">
        <div class="form-group">
            <label for="email">Email / Username:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="password">Parolă:</label>
            <input type="password" id="password" name="password" required>
            <small style="color: gray;">(Fără validare intenționat)</small>
        </div>

        <button type="submit">Creează Cont</button>
    </form>
    
    <div id="message"></div>
</div>

<script>

    document.getElementById('registerForm').addEventListener('submit', async function(event) {
        event.preventDefault(); 

        const emailVal = document.getElementById('email').value;
        const passwordVal = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        let API;

        if(window.location.href.includes("nonvulnerable")){
            API = 'http://127.0.0.1:8000/nonvulnerable/register';   
        } else {
            API = 'http://127.0.0.1:8000/vulnerable/register';
        }

        try {
            // Trimitem datele către backend-ul FastAPI sub formă de JSON
            const response = await fetch(API, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: emailVal, password: passwordVal })
            });

            const data = await response.json();

            // Verificăm dacă request-ul a avut succes
            if (response.ok) {
                messageDiv.style.color = 'green';
                messageDiv.innerText = "Succes: " + data.message;
            } else {
                messageDiv.style.color = 'red';
                // Afișăm detaliul erorii (ex: "User deja existent")
                messageDiv.innerText = "Eroare: " + data.detail; 
            }
        } catch (error) {
            console.log("Eroare la conexiune:", error);
            messageDiv.style.color = 'red';
            messageDiv.innerText = "Eroare de conexiune la server. Ai pornit FastAPI?";
        }
    });
</script>

</body>
</html>
