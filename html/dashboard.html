<!DOCTYPE html>
<html lang="ro">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard</title>
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			background: linear-gradient(135deg, #f8fafc, #e2e8f0);
		}

		.card {
			width: min(420px, 92vw);
			background: #ffffff;
			border-radius: 16px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
			padding: 28px;
		}

		h1 {
			margin: 0 0 10px;
			color: #0f172a;
			font-size: 1.8rem;
		}

		p {
			margin: 0 0 24px;
			color: #475569;
		}

		.actions {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
		}

		.btn {
			border: none;
			border-radius: 10px;
			padding: 11px 16px;
			font-size: 0.95rem;
			font-weight: 600;
			cursor: pointer;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			justify-content: center;
		}

		.btn-logout {
			background: #dc2626;
			color: #ffffff;
		}

		.btn-forgot {
			background: #0f172a;
			color: #ffffff;
		}
	</style>
</head>
<body>
	<div class="card">
		<h1>Dashboard</h1>
		<p>Alege o acțiune:</p>

		<div class="actions">
			<a class="btn btn-logout" href="/">Log out</a>
			<a class="btn btn-forgot" href="/reset-password">Forgot password</a>
		</div>
	</div>
</body>
</html>
