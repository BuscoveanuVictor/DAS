<!DOCTYPE html>
<html lang="ro">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Resetare Parola</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			background-color: #2c3e50;
			margin: 0;
		}

		.container {
			background-color: white;
			padding: 30px;
			border-radius: 8px;
			box-shadow: 0 4px 8px rgba(0,0,0,0.2);
			width: 320px;
		}

		h2 {
			text-align: center;
			color: #f39c12;
			margin-top: 0;
		}

		.form-group {
			margin-bottom: 15px;
		}

		label {
			display: block;
			margin-bottom: 5px;
			font-weight: bold;
		}

		input {
			width: 100%;
			padding: 10px;
			border: 1px solid #ccc;
			border-radius: 4px;
			box-sizing: border-box;
		}

		button {
			width: 100%;
			padding: 10px;
			background-color: #f39c12;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			font-size: 16px;
			font-weight: bold;
		}

		button:hover {
			background-color: #d68910;
		}

		#message {
			margin-top: 15px;
			text-align: center;
			font-weight: bold;
			font-size: 14px;
		}

		.links {
			margin-top: 15px;
			text-align: center;
			font-size: 12px;
		}

		.links a {
			color: #3498db;
			text-decoration: none;
		}
	</style>
</head>
<body>

<div class="container">
	<h2>Resetare Parola</h2>
	<form id="forgotPasswordForm">
		<div class="form-group">
			<label for="email">Email:</label>
			<input type="email" id="email" name="email" required>
		</div>
		<button type="submit">Trimite link de resetare</button>
	</form>

	<form id="newPasswordForm" style="display: none;">
		<div class="form-group">
			<label for="new_password">Parolă nouă:</label>
			<input type="password" id="new_password" name="new_password" required>
		</div>
		<button type="submit">Resetează parola</button>
	</form>

	<div id="message"></div>

	<div class="links">
		<a href="/">Înapoi la login</a>
	</div>
</div>

<script>
	const messageDiv = document.getElementById('message');
	const forgotPasswordForm = document.getElementById('forgotPasswordForm');
	const newPasswordForm = document.getElementById('newPasswordForm');
	const token = new URLSearchParams(window.location.search).get('token');

	if (token) {
		forgotPasswordForm.style.display = 'none';
		newPasswordForm.style.display = 'block';
	}

	forgotPasswordForm.addEventListener('submit', async function(event) {
		event.preventDefault();

		const emailVal = document.getElementById('email').value;

		try {
			const response = await fetch('/request-reset', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({
					email: emailVal
				})
			});

			const data = await response.json();

			if (response.ok) {
				messageDiv.style.color = 'green';
				messageDiv.innerText = data.message + (data.link ? " Link: " + data.link : "");
			} else {
				messageDiv.style.color = 'red';
				messageDiv.innerText = 'Eroare: ' + data.detail;
			}
		} catch (error) {
			messageDiv.style.color = 'red';
			messageDiv.innerText = 'Eroare de conexiune. Serverul rulează?';
		}
	});

	newPasswordForm.addEventListener('submit', async function(event) {
		event.preventDefault();

		const newPasswordVal = document.getElementById('new_password').value;
		console.log('Token:', token);
		try {
			const response = await fetch('/reset-password', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({
					token: token,
					new_password: newPasswordVal
				})
			});

			const data = await response.json();

			if (response.ok) {
				messageDiv.style.color = 'green';
				messageDiv.innerText = data.message;
				newPasswordForm.reset();
			} else {
				messageDiv.style.color = 'red';
				messageDiv.innerText = 'Eroare: ' + data.detail;
			}
		} catch (error) {
			messageDiv.style.color = 'red';
			messageDiv.innerText = 'Eroare de conexiune. Serverul rulează?';
		}
	});
</script>

</body>
</html>
